<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bankapur Stores | Secure Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg: #ffffff;
            --surface: #f8fafc;
            --primary: #22c55e;
            --text-main: #0f172a;
            --text-gray: #64748b;
            --border: #e2e8f0;
            --accent-glow: rgba(34, 197, 94, 0.15);
        }

        /* AMOLED Dark Mode */
        body.dark-mode {
            --bg: #000000;
            --surface: #0a0a0a;
            --text-main: #ffffff;
            --text-gray: #a1a1aa;
            --border: #1a1a1a;
            --accent-glow: rgba(34, 197, 94, 0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            transition: background 0.4s ease;
        }

        .wrapper { width: 100%; max-width: 400px; padding: 40px 24px; animation: fadeIn 0.8s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Non-edgy square logo (Squircle) */
        .logo-box {
            width: 72px; height: 72px; background: var(--primary);
            border-radius: 18px; margin: 0 auto 25px auto;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; box-shadow: 0 10px 25px var(--accent-glow);
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 28px; font-weight: 800; margin: 0; letter-spacing: -1px; }
        header p { color: var(--text-gray); margin-top: 8px; font-size: 14px; }

        .group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
        label { font-size: 11px; font-weight: 800; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1.2px; padding-left: 4px; }

        input {
            width: 100%; height: 52px; background: var(--surface);
            border: 1px solid var(--border); border-radius: 12px;
            padding: 0 16px; font-size: 16px; color: var(--text-main);
            outline: none; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--accent-glow); }

        .fixed-input { background: rgba(128,128,128,0.05); color: var(--text-gray); border-style: dashed; cursor: not-allowed; }

        /* OTP Input Boxes */
        .otp-container { display: flex; justify-content: center; gap: 12px; margin: 25px 0; }
        .otp-input {
            width: 55px; height: 65px; text-align: center; font-size: 24px; font-weight: 800;
            border-radius: 14px; background: var(--surface); border: 1px solid var(--border);
            padding: 0;
        }

        /* Countdown Timer */
        .timer-box { text-align: center; margin: 15px 0; font-size: 14px; color: var(--text-gray); font-weight: 600; }
        .timer-box span { color: var(--primary); font-variant-numeric: tabular-nums; }

        #otpScreen { display: none; }

        .primary-btn {
            width: 100%; height: 58px; background: var(--primary);
            color: white; border: none; border-radius: 14px;
            font-weight: 700; font-size: 17px; margin-top: 10px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: all 0.3s;
        }
        .primary-btn:active { transform: scale(0.96); opacity: 0.9; }

        .status-msg { text-align: center; font-size: 13px; margin-top: 25px; color: var(--text-gray); }
        .status-msg b { color: var(--primary); cursor: pointer; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="logo-box"><img src="logo.png" alt="B"></div>

        <div id="loginScreen">
            <header>
                <h1>Initialize</h1>
                <p>Register your session for Harapanahalli</p>
            </header>

            <div class="group"><label>Full Name</label><input type="text" id="uName" placeholder="e.g. Nikhil"></div>
            <div class="group"><label>Phone Number</label><input type="tel" id="uPhone" placeholder="+91"></div>
            
            <div style="margin: 20px 0 10px 4px; font-size: 11px; font-weight: 900; color: var(--primary); letter-spacing: 1px;">DELIVERY ADDRESS</div>
            
            <div class="group"><label>Door No</label><input type="text" id="uDoor" placeholder="Flat/House No"></div>
            <div class="group"><label>Street</label><input type="text" id="uStreet" placeholder="Street Name"></div>
            <div class="group"><label>Area</label><input type="text" id="uArea" placeholder="Locality/Ward"></div>
            <div class="group"><label>City</label><input type="text" value="Harapanahalli" class="fixed-input" readonly tabindex="-1"></div>

            <button class="primary-btn" id="reqBtn" onclick="requestLogin()">
                Request Access <i class="fa-solid fa-chevron-right"></i>
            </button>
        </div>

        <div id="otpScreen">
            <header>
                <h1>Verification</h1>
                <p id="otpSubText">Enter the 4-digit code sent to Nikhil</p>
            </header>

            <div class="otp-container">
                <input type="number" class="otp-input" oninput="moveFocus(this, 'otp2')" id="otp1">
                <input type="number" class="otp-input" oninput="moveFocus(this, 'otp3')" id="otp2">
                <input type="number" class="otp-input" oninput="moveFocus(this, 'otp4')" id="otp3">
                <input type="number" class="otp-input" oninput="limitInput(this)" id="otp4">
            </div>

            <div class="timer-box">Session expires in <span id="timer">10:00</span></div>

            <button class="primary-btn" onclick="verifyAccess()">
                Confirm & Enter <i class="fa-solid fa-circle-check"></i>
            </button>

            <p class="status-msg">Wrong info? <b onclick="location.reload()">Go back and edit</b></p>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "8668013778:AAEnWA0uY3tDUOQP1uHQEVJdcAGaWgfy4eA";
        const CHAT_ID = "7217028526";
        let localSecretCode = "";

        // Apply Dark Mode if stored
        if(localStorage.getItem('bankapur_amoled') === 'true') document.body.classList.add('dark-mode');

        function moveFocus(current, nextId) {
            if (current.value.length >= 1) {
                document.getElementById(nextId).focus();
            }
        }

        function limitInput(current) {
            if (current.value.length > 1) current.value = current.value.slice(0, 1);
        }

        function startTimer() {
            let duration = 600; 
            const display = document.getElementById('timer');
            const countdown = setInterval(() => {
                let minutes = Math.floor(duration / 60);
                let seconds = duration % 60;
                display.textContent = `${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                if (--duration < 0) {
                    clearInterval(countdown);
                    alert("Session expired. Please request again.");
                    location.reload();
                }
            }, 1000);
        }

        function requestLogin() {
            const data = {
                name: document.getElementById('uName').value,
                phone: document.getElementById('uPhone').value,
                door: document.getElementById('uDoor').value,
                street: document.getElementById('uStreet').value,
                area: document.getElementById('uArea').value,
                city: "Harapanahalli"
            };

            if(!data.name || !data.phone || !data.area) return alert("Please fill all details");

            localSecretCode = Math.floor(1000 + Math.random() * 9000).toString();

            const text = `🚨 *LOGIN REQUEST*%0A👤 *Name:* ${data.name}%0A📞 *Phone:* ${data.phone}%0A🏠 *Addr:* ${data.door}, ${data.street}%0A📍 *Area:* ${data.area}%0A🔑 *CODE:* \`${localSecretCode}\``;
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${text}&parse_mode=Markdown`;

            document.getElementById('reqBtn').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';

            fetch(url).then(res => {
                if(res.ok) {
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('otpScreen').style.display = 'block';
                    startTimer();
                    localStorage.setItem('pendingUser', JSON.stringify(data));
                }
            });
        }

        function verifyAccess() {
            const code = document.getElementById('otp1').value + 
                         document.getElementById('otp2').value + 
                         document.getElementById('otp3').value + 
                         document.getElementById('otp4').value;

            if(code === localSecretCode) {
                const profile = JSON.parse(localStorage.getItem('pendingUser'));
                localStorage.setItem('userProfile', JSON.stringify(profile));
                localStorage.removeItem('pendingUser');
                window.location.href = "stores.html";
            } else {
                alert("Incorrect code. Ask Nikhil for the 4-digit number.");
            }
        }
    </script>
</body>
</html>
