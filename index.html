<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bankapur Stores | Secure Login</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#22c55e">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg: #ffffff;
            --surface: #f8fafc;
            --primary: #22c55e;
            --text-main: #0f172a;
            --text-gray: #64748b;
            --border: #e2e8f0;
        }

        body.dark-mode {
            --bg: #000000;
            --surface: #0a0a0a;
            --text-main: #ffffff;
            --text-gray: #a1a1aa;
            --border: #1a1a1a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            transition: background 0.4s ease;
        }

        .wrapper { width: 100%; max-width: 400px; padding: 40px 24px; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .logo-box {
            width: 72px; height: 72px; background: var(--primary);
            border-radius: 18px; margin: 0 auto 25px auto;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 28px; font-weight: 800; margin: 0; letter-spacing: -1px; }
        header p { color: var(--text-gray); margin-top: 8px; font-size: 14px; }

        .group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
        label { font-size: 11px; font-weight: 800; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1.2px; padding-left: 4px; }

        input {
            width: 100%; height: 52px; background: var(--surface);
            border: 1px solid var(--border); border-radius: 12px;
            padding: 0 16px; font-size: 16px; color: var(--text-main);
            outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); }

        .fixed-input { background: rgba(128,128,128,0.05); color: var(--text-gray); border-style: dashed; cursor: not-allowed; }

        .otp-container { display: flex; justify-content: center; gap: 12px; margin: 25px 0; }
        .otp-input {
            width: 55px; height: 65px; text-align: center; font-size: 24px; font-weight: 800;
            border-radius: 14px; background: var(--surface); border: 1px solid var(--border);
        }

        .timer-box { text-align: center; margin: 15px 0; font-size: 14px; color: var(--text-gray); font-weight: 600; }
        .timer-box span { color: var(--primary); font-variant-numeric: tabular-nums; }

        #otpScreen { display: none; }

        .primary-btn {
            width: 100%; height: 58px; background: var(--primary);
            color: white; border: none; border-radius: 14px;
            font-weight: 700; font-size: 17px; margin-top: 10px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .primary-btn:active { transform: scale(0.96); }

        .status-msg { text-align: center; font-size: 13px; margin-top: 25px; color: var(--text-gray); }
        .status-msg b { color: var(--primary); cursor: pointer; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="logo-box"><img src="logo.png" alt="B"></div>

        <div id="loginScreen">
            <header>
                <h1>Initialize</h1>
                <p>Register session for Harapanahalli</p>
            </header>

            <div class="group"><label>Full Name</label><input type="text" id="uName" placeholder="e.g. Nikhil"></div>
            <div class="group"><label>Phone Number</label><input type="tel" id="uPhone" placeholder="+91"></div>
            
            <div style="margin: 20px 0 10px 4px; font-size: 11px; font-weight: 900; color: var(--primary);">DELIVERY ADDRESS</div>
            <div class="group"><label>Door No</label><input type="text" id="uDoor" placeholder="Flat No"></div>
            <div class="group"><label>Street</label><input type="text" id="uStreet" placeholder="Main St"></div>
            <div class="group"><label>Area</label><input type="text" id="uArea" placeholder="Locality"></div>
            <div class="group"><label>City</label><input type="text" value="Harapanahalli" class="fixed-input" readonly tabindex="-1"></div>

            <button class="primary-btn" id="reqBtn" onclick="requestLogin()">
                Request Access <i class="fa-solid fa-chevron-right"></i>
            </button>
        </div>

        <div id="otpScreen">
            <header>
                <h1>Verification</h1>
                <p>Enter the 4-digit code sent to Nikhil</p>
            </header>

            <div class="otp-container">
                <input type="number" class="otp-input" oninput="moveFocus(this, 'otp2')" id="otp1">
                <input type="number" class="otp-input" oninput="moveFocus(this, 'otp3')" id="otp2">
                <input type="number" class="otp-input" oninput="moveFocus(this, 'otp4')" id="otp3">
                <input type="number" class="otp-input" oninput="limitInput(this)" id="otp4">
            </div>

            <div class="timer-box">Expires in <span id="timer">10:00</span></div>
            <button class="primary-btn" onclick="verifyAccess()">Confirm & Enter</button>
            <p class="status-msg">Wrong info? <b onclick="location.reload()">Edit Details</b></p>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "8668013778:AAEnWA0uY3tDUOQP1uHQEVJdcAGaWgfy4eA";
        const CHAT_ID = "7217028526";

        window.onload = () => {
            // 1. Check for AMOLED
            if(localStorage.getItem('bankapur_amoled') === 'true') document.body.classList.add('dark-mode');
            
            // 2. Check if already logged in
            if(localStorage.getItem('userProfile')) {
                window.location.href = "stores.html";
            }
            
            // 3. Register PWA
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js');
            }
        };

        function moveFocus(current, nextId) { if (current.value.length >= 1) document.getElementById(nextId).focus(); }
        function limitInput(current) { if (current.value.length > 1) current.value = current.value.slice(0, 1); }

        function startTimer() {
            let duration = 600; 
            const display = document.getElementById('timer');
            const countdown = setInterval(() => {
                let mins = Math.floor(duration / 60);
                let secs = duration % 60;
                display.textContent = `${mins < 10 ? '0' : ''}${mins}:${secs < 10 ? '0' : ''}${secs}`;
                if (--duration < 0) { clearInterval(countdown); location.reload(); }
            }, 1000);
        }

        function requestLogin() {
            const data = {
                name: document.getElementById('uName').value,
                phone: document.getElementById('uPhone').value,
                door: document.getElementById('uDoor').value,
                street: document.getElementById('uStreet').value,
                area: document.getElementById('uArea').value,
                city: "Harapanahalli"
            };
            if(!data.name || !data.phone) return alert("Required fields missing");

            const code = Math.floor(1000 + Math.random() * 9000).toString();
            sessionStorage.setItem('currentOTP', code); // Store in session so it survives refresh

            const text = `🚨 *LOGIN REQUEST*%0A👤 *Name:* ${data.name}%0A📞 *Phone:* ${data.phone}%0A🏠 *Addr:* ${data.door}, ${data.street}%0A📍 *Area:* ${data.area}%0A🔑 *CODE:* \`${code}\``;
            
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${text}&parse_mode=Markdown`)
            .then(res => {
                if(res.ok) {
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('otpScreen').style.display = 'block';
                    startTimer();
                    localStorage.setItem('pendingUser', JSON.stringify(data));
                }
            });
        }

        function verifyAccess() {
            const enteredCode = document.getElementById('otp1').value + document.getElementById('otp2').value + document.getElementById('otp3').value + document.getElementById('otp4').value;
            const correctCode = sessionStorage.getItem('currentOTP');

            if(enteredCode === correctCode) {
                const pendingData = localStorage.getItem('pendingUser');
                localStorage.setItem('userProfile', pendingData);
                localStorage.removeItem('pendingUser');
                sessionStorage.removeItem('currentOTP');
                window.location.href = "stores.html";
            } else { 
                alert("Incorrect code. Please check your message from Nikhil."); 
            }
        }
    </script>
</body>
</html>
